<button id="theme-toggle">🌙</button>
<div id="menu-toggle">☰</div>
</header>

<section class="contact reveal">
<h2>Réservation</h2>

<img src="https://cdn.jsdelivr.net/gh/Honops/imagesrestaurantsite/images/staff/img19.jpg?width=800" class="contact-img" alt="Restaurant contact">

<form>
<label>Nom</label>
<input type="text" placeholder="Votre nom" required>

<label>Email</label>
<input type="email" placeholder="Votre email" required>

<label>Date</label>
<input type="date" required>

<label>Nombre de personnes</label>
<input type="number" min="1" max="10" required>

<label>Message</label>
<textarea placeholder="Message..."></textarea>

<button type="submit">Réserver</button>
</form>

<p class="note">
⚠️ Ceci est une démonstration de site web — aucune réservation réelle.
</p>
</section>

<footer>
<p>© 2026 Hono Restaurant</p>
</footer>
